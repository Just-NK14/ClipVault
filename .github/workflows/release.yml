name: Build and Release ClipVault

on:
  push:
    tags:
      - 'v*' # Triggers whenever you push a tag starting with 'v'

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Ensure this matches your project version

    - name: Restore Dependencies
      run: dotnet restore

    - name: Publish Executable
      # This builds a single, optimized, self-contained .exe file
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ./publish

    - name: Zip Artifacts
      shell: powershell
      run: Compress-Archive -Path ./publish/* -DestinationPath ClipVault_Release.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ClipVault_Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}